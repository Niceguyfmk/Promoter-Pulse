name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: promoter-pulse/package-lock.json
      - run: npm ci
        working-directory: promoter-pulse
      - run: npm run typecheck
        working-directory: promoter-pulse
      - run: npm run lint
        working-directory: promoter-pulse
      - run: npm run build
        working-directory: promoter-pulse
